name: Tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (windows)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install project + test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Run test suite
        # Run SERIALLY (-n0, overriding pyproject's -n auto): a flaky KeyboardInterrupt
        # under parallel xdist intermittently aborts the whole session on the Windows
        # runner. --timeout bounds every test (thread method = Windows-compatible; the
        # conftest SIGALRM timeout is POSIX-only).
        # NOTE: do NOT add -p no:cacheprovider here — in serial mode the main process
        # does collection, and the CLI's --profile/-p argv scan misreads it and
        # sys.exits during collection.
        run: pytest tests/ -n0 -v --full-trace --timeout=120 --timeout-method=thread
