name: Tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (windows)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install project + test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Run test suite
        # pyproject sets addopts = "-m 'not integration' -n auto", so integration
        # tests are skipped and the suite runs in parallel. --timeout bounds every
        # test (thread method = Windows-compatible; the conftest SIGALRM timeout is
        # POSIX-only) so a hung test fails cleanly instead of aborting the session.
        run: pytest tests/ -p no:cacheprovider --timeout=120 --timeout-method=thread
